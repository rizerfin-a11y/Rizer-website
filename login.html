<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Rizer Productivity</title>
    <meta name="description" content="Sign in with Google to start your free 24-hour trial.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container" id="login-container">
            <div class="auth-logo">Rizer</div>
            <div class="auth-subtitle">Smart Productivity Intelligence</div>

            <div class="auth-trial-badge">
                🎁 Start your <strong>free 24-hour trial</strong> — no credit card required
            </div>

            <!-- Error Message -->
            <div class="auth-error" id="auth-error"></div>

            <!-- Login Step -->
            <div id="login-step" style="text-align: center;">
                <button class="auth-btn"
                    style="background: white; color: #1e293b; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; font-weight: 600;"
                    onclick="proceedWithGoogle()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G"
                        width="20" height="20">
                    Continue with Google
                </button>
            </div>


            <div class="auth-footer">
                <p>By continuing, you agree to our
                    <a href="terms.html">Terms</a> &
                    <a href="privacy.html">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // If already logged in, redirect to app
        (async () => {
            const session = await getCurrentSession();
            if (session) {
                window.location.href = 'index.html';
            }
        })();

        function proceedWithGoogle() {
            // Log in with Google via Supabase OAuth
            loginWithGoogleOAuth();
        }
    </script>

</body>

</html>
