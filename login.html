<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Rizer Productivity</title>
    <meta name="description" content="Sign in with Google to start your free 24-hour trial.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container" id="login-container">
            <div class="auth-logo">Rizer</div>
            <div class="auth-subtitle">Smart Productivity Intelligence</div>

            <div class="auth-trial-badge">
                🎁 Start your <strong>free 24-hour trial</strong> — no credit card required
            </div>

            <!-- Error Message -->
            <div class="auth-error" id="auth-error"></div>

            <!-- Login Step -->
            <div id="login-step" style="text-align: center;">
                <button class="auth-btn"
                    style="background: white; color: #1e293b; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; font-weight: 600;"
                    onclick="showCalendarPrompt()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G"
                        width="20" height="20">
                    Continue with Google
                </button>
            </div>

            <!-- Calendar Permission Step (Hidden initially) -->
            <div id="calendar-step" style="display: none; text-align: center;">
                <div style="font-size: 40px; margin-bottom: 16px;">📅</div>
                <h3 style="margin-bottom: 12px; color: #0f172a;">Sync with Google Calendar?</h3>
                <p style="margin-bottom: 24px; color: #64748b; font-size: 14px; line-height: 1.5;">
                    Would you like Rizer to sync your tasks with your Google Calendar? <br>
                    <span style="font-size: 12px;">You can change this anytime in settings.</span>
                </p>

                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="auth-btn" style="background: #6366f1; color: white;"
                        onclick="proceedWithGoogle(true)">
                        Yes, Sync my Calendar
                    </button>
                    <button class="auth-btn" style="background: #f1f5f9; color: #475569; box-shadow: none;"
                        onclick="proceedWithGoogle(false)">
                        No, Thanks
                    </button>
                </div>
            </div>

            <div class="auth-footer">
                <p>By continuing, you agree to our
                    <a href="terms.html">Terms</a> &
                    <a href="privacy.html">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // If already logged in, redirect to app
        (async () => {
            const session = await getCurrentSession();
            if (session) {
                window.location.href = 'index.html';
            }
        })();

        function showCalendarPrompt() {
            document.getElementById('login-step').style.display = 'none';
            document.getElementById('calendar-step').style.display = 'block';
        }

        function proceedWithGoogle(withCalendar) {
            // Save their preference locally so index.html knows if they connected
            localStorage.setItem('pending_gcal_pref', withCalendar ? 'true' : 'false');

            // Trigger Supabase Google OAuth
            loginWithGoogleOAuth(withCalendar);
        }
    </script>
</body>

</html>
