<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Rizer Productivity</title>
    <meta name="description" content="Sign in with Google to access Rizer Productivity tools.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container" id="login-container">
            <div class="auth-logo">Rizer</div>
            <div class="auth-subtitle">Smart Productivity Intelligence</div>



            <!-- Error Message -->
            <div class="auth-error" id="auth-error"></div>

            <!-- Login Step -->
            <div id="login-step" style="text-align: center;">
                <button class="auth-btn"
                    style="background: white; color: #1e293b; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 16px; font-weight: 600;"
                    onclick="proceedWithGoogle()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G"
                        width="20" height="20">
                    Continue with Google
                </button>
            </div>


            <div class="auth-footer">
                <p>By continuing, you agree to our
                    <a href="terms.html">Terms</a> &
                    <a href="privacy.html">Privacy Policy</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Calendar Sync Prompt Modal -->
    <div id="calendar-prompt-modal"
        style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div
            style="background: white; padding: 40px 32px; border-radius: 20px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; animation: scaleIn 0.2s ease-out;">
            <div style="font-size: 48px; margin-bottom: 20px;">📅</div>
            <h2 style="margin-bottom: 12px; font-size: 22px; font-weight: 700; color: #0f172a;">Sync Google Calendar?
            </h2>
            <p style="margin-bottom: 32px; color: #475569; line-height: 1.6; font-size: 15px;">
                Would you like to sync your goals and tasks directly to your Google Calendar?
            </p>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="auth-btn" style="background: #6366f1; color: white;" onclick="finalizeLogin(true)">Yes,
                    Sync Calendar</button>
                <button class="auth-btn" style="background: white; border: 1px solid #e2e8f0; color: #475569;"
                    onclick="finalizeLogin(false)">No, Just Login</button>
            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // If already logged in, redirect to app
        (async () => {
            const session = await getCurrentSession();
            if (session) {
                window.location.href = 'index.html';
            }
        })();

        function proceedWithGoogle() {
            document.getElementById('calendar-prompt-modal').style.display = 'flex';
        }

        function finalizeLogin(wantsCalendar) {
            document.getElementById('calendar-prompt-modal').style.display = 'none';
            loginWithGoogleOAuth(wantsCalendar);
        }
    </script>

</body>

</html>
